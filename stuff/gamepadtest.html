<script>
const btn = document.getElementById("myBtn");

// Add EventListener to btn
btn.addEventListener("click", function () {
  document.getElementById("demo").innerHTML = Date();
});

window.addEventListener("gamepadconnected", (e) => {
  const gp = navigator.getGamepads()[e.gamepad.index];
  document.getElementById("demo").innerHTML = `Gamepad connected at index ${gp.index}: ${gp.id}. It has ${gp.buttons.length} buttons and ${gp.axes.length} axes. ${gp.axes[0]}`;
});

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gamepad Axes Monitor</title>
<style>
  body { font-family: sans-serif; font-size: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select, input { font-size: 12px; }
  .axes { margin-top: 8px; font-family: monospace; }
</style>
</head>
<body>

<div class="row">
  Gamepad:
  <select id="gamepadSelect"></select>
</div>  
<div class="row">
  X Axis:
  <select id="xAxis"></select>
  <label><input type="checkbox" id="invertX">Invert</label>

  Y Axis:
  <select id="yAxis"></select>
  <label><input type="checkbox" id="invertY">Invert</label>

  <span>X: <span id="xVal">0.00</span></span>
  <span>Y: <span id="yVal">0.00</span></span>
</div>

<div class="axes" id="axesDisplay"></div>

<script>
const gamepadSelect = document.getElementById('gamepadSelect');
const xAxisSelect = document.getElementById('xAxis');
const yAxisSelect = document.getElementById('yAxis');
const invertX = document.getElementById('invertX');
const invertY = document.getElementById('invertY');
const axesDisplay = document.getElementById('axesDisplay');
const xVal = document.getElementById('xVal');
const yVal = document.getElementById('yVal');

function populateGamepads() {
  const gamepads = navigator.getGamepads();
  gamepadSelect.innerHTML = '';
  for (let i = 0; i < gamepads.length; i++) {
    if (gamepads[i]) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${i}: ${gamepads[i].id}`;
      gamepadSelect.appendChild(opt);
    }
  }
}

function populateAxesSelectors(count = 6) {
  xAxisSelect.innerHTML = '';
  yAxisSelect.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const optX = new Option(i, i);
    const optY = new Option(i, i);
    xAxisSelect.add(optX);
    yAxisSelect.add(optY);
  }
}

function format(v) {
  return (Math.round(v * 100) / 100).toFixed(2);
}

function update() {
  const gamepads = navigator.getGamepads();
  const gp = gamepads[gamepadSelect.value];

  if (!gp) return;

  const axes = gp.axes.slice(0, 6);

  axesDisplay.textContent = axes
    .map((v, i) => `A${i}: ${format(v)}`)
    .join(' | ');

  let x = axes[xAxisSelect.value] || 0;
  let y = axes[yAxisSelect.value] || 0;

  if (invertX.checked) x *= -1;
  if (invertY.checked) y *= -1;

  xVal.textContent = format(x);
  yVal.textContent = format(y);
}

// Event listeners
window.addEventListener("gamepadconnected", populateGamepads);
window.addEventListener("gamepaddisconnected", populateGamepads);

// Init
populateGamepads();
populateAxesSelectors();

// Poll every 100ms
setInterval(update, 100);
</script>

</body>
</html>
