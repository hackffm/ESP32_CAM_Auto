<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hackffm ESP32 CAM Bot</title>
  <style>
    body {
      font-family: sans-serif; margin: 0; /* font-size: 14px; */
      padding: 10px; background: #080505; color: white; text-align: center; }

    h1 { margin: 4px 0; color: #f0ad5e; }

    /* Make photo-container the positioning context for absolute joystick overlay */
    #photo-container { position: relative; display: inline-block; max-width: 100%; }

    #media-wrapper { display: flex; justify-content: center;
      align-items: center; gap: 20px; flex-wrap: wrap; }

    /* Side-by-side mode for larger screens */
    .side-mode { flex-direction: row; }

    /* Normal stacked mode */
    .normal-mode { flex-direction: column; }

    /* Joystick base styles */
    #joystick { margin: 0; touch-action: none; transition: all 0.2s ease; z-index: 10; }

    /* Joystick in normal mode - centered below image */
    .normal-mode #joystick { display: block; margin: 15px auto; width: 300px; height: 300px; }

    /* Joystick overlay mode - absolute positioned over image */
    .side-mode #joystick { position: absolute; right: 10px; bottom: 10px;
      /* Size calculated dynamically in JS, but start with reasonable size */
      width: 210px; height: 210px; pointer-events: auto; }

    #photo { display: block; max-width: 100%; height: auto; }

    #info { font-family: monospace; margin-top: 6px; color: #aaa; white-space: pre-wrap; }

    .mode-switch { margin: 10px 0; }

    .sliders-wrapper { display: flex; flex-direction: column; gap: 8px;
       width: 95%; max-width: 450px; margin: 15px auto; text-align: left; }
    .slider-container label { font-weight: bold; color: #8bdcf3; font-size: 14px; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; height: 35px; }
    .slider-value { min-width: 45px; font-weight: bold; color: #9b8bf3; }

    .mein-button { padding: 10px 20px; font-size: 24px; border: none; border-radius: 6px;
       background-color: #007bff; color: rgb(12, 112, 133); cursor: pointer; transition: background-color 0.2s;
    }

    /* gpds = Gamepad selector styles */
    .gpds_row { display: flex; gap: 8px; 
      align-items: center; justify-content: center; flex-wrap: wrap; }
    /* select, input { font-size: 12px; } */
    .gpds_axes { margin-top: 5px; font-family: monospace; }

    .pt_row { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 4px; }
    input, select { font-size: 12px; padding: 2px;}
    input[type="text"] { width: 90px; }
    input[type="number"] { width: 55px; }
    .pt_header { font-weight: bold; margin-top: 10px; }
    .pt_container { border: 1px solid #ccc; padding: 6px; margin-bottom: 6px; }
    button { padding: 4px 8px; font-size: 12px; }

  </style>
</head>
<body>
  <h1 id="title">Hackffm ESP32 CAM Bot</h1>

  <div id="media-wrapper" class="normal-mode">
    <div id="photo-container">
      <img id="photo">
      <!-- Joystick now inside photo-container for proper absolute positioning -->
      <canvas id="joystick" width="300" height="300"></canvas>
    </div>
  </div>

  <div class="mode-switch">
    <label>
      <input type="checkbox" id="modeToggle">
      Joystick overlay (right aligned)
    </label>
  </div>

  <div id="info"></div>

  <div class="sliders-wrapper" id="sliders"></div>

  <div class="gpds_row">
    Gamepad:
    <select id="gpdsel_gamepadSelect"></select>
  </div>  
  <div class="gpds_row">
    X Axis:
    <select id="gpdsel_xAxis">
      <option value="0" selected>0</option><option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option><option value="5">5</option>
    </select>
    <label><input type="checkbox" id="gpdsel_invertX">Invert</label>

    Y Axis:
    <select id="gpdsel_yAxis">      
      <option value="0">0</option><option value="1" selected>1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
    <label><input type="checkbox" id="gpdsel_invertY">Invert</label>

    <span>X: <span id="gpdsel_xVal">0.00</span></span>
    <span>Y: <span id="gpdsel_yVal">0.00</span></span>
  </div>
  <div class="gpds_axes" id="gpdsel_axesDisplay"></div>

  <br><br>
  <button id="btn-reconnect" class="btn-reconnect-css">WiFi reconnect</button>
  <br><br>

  <div class="gpds_row">
    <form action="/action" method="GET">
      <label for="roboter_name">Set Bot Name:</label>
      <input type="text" id="roboter_name" name="roboter_name">
      <input type="submit" value="Change Bot Name">
    </form>
  </div>

    <br><br>

  <div class="gpds_row">Configure WiFi:
    <form action="/action" method="GET">
      <label for="wifi_ssid">SSID:</label>
      <input type="text" id="wifi_ssid" name="wifi_ssid">

  <br><br>

  <div id="pt_configs"></div>
  <div class="pt_row">
    <button onclick="pt_retrievePwmThings()">Retrieve</button>
    <button onclick="pt_storePwmThings()">Store</button>
  </div>

  <div class="gpds_row">
    <button id="searchGamepad">Search gamepad</button>
    <p id="output">No gamepad detected</p>
  </div>

  &copy; 2026 Hackerspace-FFM e.V.

<script>
    /* ================= CONFIG ================= */
    const LIMIT_RADIUS = 150;
    const DEADZONE_RADIUS = 0;
    const STICK_RADIUS = 25;
    const MAX_VALUE = 255;
    const UPDATE_INTERVAL = 50;
    let   STICK_COLOR = "rgba(255,165,0,0.3)";

    const STICK_X_EXPO_FACTOR = 0.35;
    const STICK_Y_EXPO_FACTOR = 0.7;

    const SERVO_MIN = -100;
    const SERVO_MAX = 100;
    /* ========================================== */

    const canvas = document.getElementById("joystick");
    const ctx = canvas.getContext("2d");
    const photo = document.getElementById("photo");
    const titleElement = document.getElementById("title");

    let stick = { x: 0, y: 0 }; // x: -LIMIT_RADIUS = left, +LIMIT_RADIUS = right; y: -LIMIT_RADIUS = up, +LIMIT_RADIUS = down
    let dragging = false;
    let lastSendTime = 0;
    let roboter_name_set = false;

    let sliderValues = { A:0, B:0, C:0, D:0, E:0 };

    /* ============= CREATE SLIDERS ============= */
    const slidersContainer = document.getElementById("sliders");

    ["A","B","C","D","E"].forEach(letter => {
      const containerDiv = document.createElement("div");
      containerDiv.className = "slider-container";

      const label = document.createElement("label");
      label.id = "label"+letter;
      label.textContent = letter;

      const row = document.createElement("div");
      row.className = "slider-row";

      const input = document.createElement("input");
      input.type = "range";
      input.min = -127;
      input.max = 127;
      input.value = 0;

      const value = document.createElement("div");
      value.className = "slider-value";
      value.textContent = "0";
      if(letter === "A") input.value = 100;

      input.addEventListener("input", () => {
        sliderValues[letter] = parseInt(input.value);
        value.textContent = input.value;
        sendData(false);
      });

      row.appendChild(input);
      row.appendChild(value);
      containerDiv.appendChild(label);
      containerDiv.appendChild(row);
      slidersContainer.appendChild(containerDiv);
    });

    /* ============= DRAW JOYSTICK ============= */
    function drawJoystick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const center = { x: canvas.width/2, y: canvas.height/2 };

      /* Outer circle (1px) */
      ctx.beginPath();
      ctx.arc(center.x, center.y, LIMIT_RADIUS, 0, Math.PI*2);
      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;
      ctx.stroke();

      /* Semi-transparent knob */
      ctx.beginPath();
      ctx.arc(center.x + stick.x,
              center.y + stick.y,
              STICK_RADIUS,
              0,
              Math.PI*2);
      ctx.fillStyle = STICK_COLOR;
      ctx.fill();
    }

    /* ============= JOYSTICK POSITION MODE ============= */
    function updateJoystickMode() {
      const wrapper = document.getElementById("media-wrapper");
      const overlayActive = document.getElementById("modeToggle").checked;

      canvas.style.width = "300px";
      canvas.style.height = "300px";

      if (!overlayActive) {
        /* Normal mode: joystick below image */
        wrapper.classList.remove("side-mode");
        wrapper.classList.add("normal-mode");

        canvas.style.position = "static";
      } else {
        /* Overlay mode: joystick over image, bottom-right corner */
        wrapper.classList.remove("normal-mode");
        wrapper.classList.add("side-mode");

        /* Calculate responsive size based on image/container dimensions */
        const containerRect = document.getElementById("photo-container").getBoundingClientRect();
        const availableWidth = containerRect.width;
        const size = Math.min(availableWidth * 0.35, 250, window.innerWidth * 0.4); // Responsive size

        canvas.style.position = "absolute";
        //canvas.style.width = size + "px";
        //canvas.style.height = size + "px";
      }

      /* Redraw joystick after resize */
      drawJoystick();
    }

    window.addEventListener("resize", updateJoystickMode);
    photo.onload = updateJoystickMode;
    photo.onerror = updateJoystickMode; // Also trigger on error

    /* ============= STICK HANDLING ============= */
    function updateStick(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      const xPos = (clientX - rect.left) * scaleX;
      const yPos = (clientY - rect.top) * scaleY;

      const center = { x: canvas.width/2, y: canvas.height/2 };

      let x = xPos - center.x;
      let y = yPos - center.y;

      const dist = Math.hypot(x, y);
      //console.log("Updating stick position based on input:", clientX-rect.left, clientY-rect.top, format_fix2(xPos), format_fix2(yPos), 
      //  "=>", format_fix2(x), format_fix2(y), "Distance from center:", format_fix2(dist));
      if (dist > LIMIT_RADIUS) {
      //  x = x * LIMIT_RADIUS / dist;
      //  y = y * LIMIT_RADIUS / dist;
      }

      //console.log("Stick position after applying limit:", format_fix2(x), format_fix2(y));

      stick = { x, y }; 
      sendData();
      drawJoystick();
    }

    function resetStick() {
      dragging = false;
      stick = { x:0, y:0 };
      sendData(true);
      drawJoystick();
    }

    /* ============= AXIS CALCULATION ============= */
    /*
    function calculateAxis(x, y) {
      const dist = Math.hypot(x, y);
      if (dist <= DEADZONE_RADIUS) return { x:0, y:0 };

      const scale = (dist - DEADZONE_RADIUS) /
                    (LIMIT_RADIUS - DEADZONE_RADIUS);

      return {
        x: Math.round((x / dist) * scale * MAX_VALUE),
        y: Math.round((y / dist) * -scale * MAX_VALUE)
      };
    }
    */

    function calculateAxis(x, y) {
      // console.log({x2:x, y2:y});
      //x = x * 0.35;
      x = 150*expo(x/150,STICK_X_EXPO_FACTOR);
      y = 150*expo(y/150,STICK_Y_EXPO_FACTOR);
      const dist = Math.hypot(x, y);
      if (dist <= DEADZONE_RADIUS) return { x:0, y:0 };

      const scale = (dist - DEADZONE_RADIUS) /
                    (LIMIT_RADIUS - DEADZONE_RADIUS);

      return {
        x: Math.round((x / dist) * scale * MAX_VALUE),
        y: Math.round((y / dist) * -scale * MAX_VALUE)
      };
    }

    function expo(val,factor) {
      let res = Math.sin(val*(Math.PI/2))*factor;
      return res;
    }

    /* ============= SEND DATA ============= */
    let retryTimeout = null;
    function sendData(force=false) {
      const now = Date.now();
      // Rate-Limit 
      if (!force && now - lastSendTime < UPDATE_INTERVAL) {
        if (!retryTimeout) {
          retryTimeout = setTimeout(() => {
            sendData(false);
          }, UPDATE_INTERVAL - (now - lastSendTime));
        }
        return;
      }
      if (retryTimeout) {
        clearTimeout(retryTimeout);
        retryTimeout = null;
      }
      lastSendTime = now;

      const axis = calculateAxis(stick.x, stick.y);

      

      fetch(`/action?x=${axis.x}&y=${axis.y}` +
            `&a=${sliderValues.A}` +
            `&b=${sliderValues.B}` +
            `&c=${sliderValues.C}` +
            `&d=${sliderValues.D}` +
            `&e=${sliderValues.E}`)
            .catch(()=>{});
    }

    /* ============= TOKEN PARSER ============= */
    function parseTokens(tokenString) {
      const regex = /([A-E]|Name)="([^"]*)"/g;
      let match;

      while ((match = regex.exec(tokenString)) !== null) {
        const key = match[1];
        const value = match[2];

        if (key === "Name") {
          titleElement.textContent = "HackFFM-Bot: "+value;
          document.title = "HackFFM-Bot: "+value;
          if(!roboter_name_set) {
            document.getElementById('roboter_name').value = value;
            roboter_name_set = true;
          }
        } else {
          const labelElement = document.getElementById("label"+key);
          if (labelElement)
            labelElement.textContent = value;
        }
      }
    }

    /* ============= INFO UPDATE ============= */
    async function updateInfo() {
      try {
        const res = await fetch('/info');
        const txt = await res.text();

        const parts = txt.split("|");

        const visibleText = parts[0].trim();
        document.getElementById("info").textContent = visibleText;

        if (parts.length > 1) {
          parseTokens(parts[1]);
        }
      } catch(e) {}

      setTimeout(updateInfo, 1000);
    }

    /* ============= STREAM ============= */
    let streamRetryDelay = 1000;
    function loadStream() { photo.src = `${window.location.origin}:81/stream?t=${Date.now()}`; updateJoystickMode();}

    photo.onload = () => { console.log("StreamOnLoed"); streamRetryDelay = 1000; };
    photo.onerror = () => { 
      console.warn("Stream load error, retrying in " + streamRetryDelay + "ms");
      setTimeout(loadStream, streamRetryDelay); 
      streamRetryDelay = Math.min(streamRetryDelay * 2, 10000); 
    };

    // Optional: watchdog for stalled streams
    setInterval(() => {
      if (!photo.complete || photo.naturalWidth === 0) {
        loadStream();
      }
    }, 10000);

    /* ============= INPUT EVENTS ============= */
    canvas.addEventListener("mousedown", e => {
      dragging = true;
      updateStick(e.clientX, e.clientY);
    });
    canvas.addEventListener("mousemove", e => {
      if (dragging) updateStick(e.clientX, e.clientY);
    });
    window.addEventListener("mouseup", resetStick);

    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      dragging = true;
      updateStick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive:false });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      if (dragging)
        updateStick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive:false });

    canvas.addEventListener("touchend", resetStick);

    document.getElementById('media-wrapper').addEventListener('click', e => {
      updateJoystickMode();
      console.log("media-wrapper clicked, redrawing joystick");
    });

    /* ============= INIT ============= */
    document.getElementById("modeToggle")
            .addEventListener("change", updateJoystickMode);

    document.getElementById("modeToggle").checked = true; // Start in overlay mode
    updateJoystickMode();        

    drawJoystick();
    loadStream();
    updateInfo();



  const gpdsel_gamepadSelect = document.getElementById('gpdsel_gamepadSelect');
  const gpdsel_xAxisSelect = document.getElementById('gpdsel_xAxis');
  const gpdsel_yAxisSelect = document.getElementById('gpdsel_yAxis');
  const gpdsel_invertX = document.getElementById('gpdsel_invertX');
  const gpdsel_invertY = document.getElementById('gpdsel_invertY');
  const gpdsel_axesDisplay = document.getElementById('gpdsel_axesDisplay');
  const gpdsel_xVal = document.getElementById('gpdsel_xVal');
  const gpdsel_yVal = document.getElementById('gpdsel_yVal');

  function gpdsel_populateGamepads() {
    const gamepads = navigator.getGamepads();
    gpdsel_gamepadSelect.innerHTML = '';
    const optdefault = document.createElement('option');
    optdefault.value = -1;
    optdefault.textContent = "No Gamepad";
    gpdsel_gamepadSelect.appendChild(optdefault);
    for (let i = 0; i < gamepads.length; i++) {
      if (gamepads[i]) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${i}: ${gamepads[i].id}`;
        gpdsel_gamepadSelect.appendChild(opt);
      }
    }
    /*
    let count = 6;
    gpdsel_xAxisSelect.innerHTML = '';
    gpdsel_yAxisSelect.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const optX = new Option(i, i);
      const optY = new Option(i, i);
      gpdsel_xAxisSelect.add(optX);
      gpdsel_yAxisSelect.add(optY);
    }
    */
  }

  function format_fix2(v) { return (Math.round(v * 100) / 100).toFixed(2); }

  let gpdsel_activityTimeout = null;

  async function gpdsel_activityTimeoutFunction() {
    console.log("Gamepad input timeout");
    gpdsel_xVal.textContent = "0.00";
    gpdsel_yVal.textContent = "0.00";
    stick = { x:0, y:0 };
    STICK_COLOR = "rgba(255,165,0,0.3)";
    sendData(true);
    drawJoystick();
    gpdsel_activityTimeout = null;
  }

  let lastGamepadButtons = null;
  let lastGamePads = null;

  let selectedGamepadIndex = null;

  function gpdsel_update() {
    const gamepads = navigator.getGamepads();
    // const gp = gamepads[gpdsel_gamepadSelect.value];
    const gp = gamepads[selectedGamepadIndex];


    if (!gp) return;
    const axes = gp.axes.slice(0, 6);
    // console.log(gp.buttons);

    // setCookie(gpdsel_gamepadSelect.value);

    search_gamepad_output.textContent = `Gamepad: ${gp.id}`;
    

    if(lastGamepadButtons!=null) {
      for(let i=0; i<gp.buttons.length; i++){
        if(lastGamepadButtons[i].pressed!=gp.buttons[i].pressed) {
          console.log(i)
          console.log(gp)
        }
      }
    }
    lastGamepadButtons = gp.buttons;
    gpdsel_axesDisplay.textContent = axes
      .map((v, i) => `A${i}: ${format_fix2(v)}`)
      .join(' | ');
    let x = axes[gpdsel_xAxisSelect.value] || 0;
    let y = axes[gpdsel_yAxisSelect.value] || 0;
    if (gpdsel_invertX.checked) x *= -1;
    if (gpdsel_invertY.checked) y *= -1;
    gpdsel_xVal.textContent = format_fix2(x);
    gpdsel_yVal.textContent = format_fix2(y);
    if ((Math.abs(x) > 0.1) || (Math.abs(y) > 0.1)) {
      if (gpdsel_activityTimeout !== null) {
        clearTimeout(gpdsel_activityTimeout);
        gpdsel_activityTimeout = null;
      } 
      // console.log("Gamepad timeout set");
      gpdsel_activityTimeout = setTimeout(gpdsel_activityTimeoutFunction, 8000);
      STICK_COLOR = "rgba(255,0,165,0.3)";
    }
    if(gpdsel_activityTimeout !== null) {
      console.log("Gamepad input:", format_fix2(x), format_fix2(y));
      stick = { x: x * LIMIT_RADIUS, y: y * LIMIT_RADIUS };
      sendData(true);
      drawJoystick();
    }
  }

  function setCookie(selectedGamePad) {
    document.cookie = "gamepad="+selectedGamePad;
  }

  function getCookie(cname) {
    let name = cname + "=";
    let decodedCookie = decodeURIComponent(document.cookie);
    let ca = decodedCookie.split(';');
    console.log(document.cookie)
    console.log(decodedCookie)
    for(let i = 0; i <ca.length; i++) {
      let c = ca[i];
      while (c.charAt(0) == ' ') {
        c = c.substring(1);
      }
      if (c.indexOf(name) == 0) {
        return c.substring(name.length, c.length);
      }
    }
    return "";
  }

  // Gamepad init stuff
  window.addEventListener("gamepadconnected", gpdsel_populateGamepads);
  window.addEventListener("gamepaddisconnected", gpdsel_populateGamepads);
  gpdsel_populateGamepads();
  setInterval(gpdsel_update, 75);

  const pt_COUNT = 4;

  const pt_thingTypes = [
    "pwmOut",
    "pwmOutGamma",
    "halfBridge",
    "halfBridgeIdleHigh",
    "servoMotor",
    "servoMotor0Stop"
  ];

  // Create UI
  function pt_createUI() {
    const container = document.getElementById("pt_configs");

    for (let i = 0; i < pt_COUNT; i++) {
      const div = document.createElement("div");
      div.className = "pt_container";
          // <div class="pt_row pt_header">#${i}</div>
      div.innerHTML = `
        <div class="pt_row">
          <span id="pt_name${i}"></span>
          PinA <input id="pt_pinA${i}" type="number">
          PinB <input id="pt_pinB${i}" type="number">

          Type 
          <select id="pt_type${i}">
            ${pt_thingTypes.map((t, idx) => `<option value="${idx}">${t}</option>`).join("")}
          </select>

          Inv <input id="pt_inv${i}" type="checkbox">

          Min <input id="pt_min${i}" type="number">
          Zero <input id="pt_zero${i}" type="number">
          Max <input id="pt_max${i}" type="number">
        </div>
      `;

      container.appendChild(div);
    }
  }

  // Parse CSV → UI
  function pt_applyConfig(index, csv) {
    const parts = csv.split(",");

    if (parts.length < 8) return;

    document.getElementById(`pt_name${index}`).textContent = parts[0];
    document.getElementById(`pt_pinA${index}`).value = parts[1];
    document.getElementById(`pt_pinB${index}`).value = parts[2];
    document.getElementById(`pt_type${index}`).value = parts[3];
    document.getElementById(`pt_inv${index}`).checked = Number(parts[4]) !== 0;
    document.getElementById(`pt_min${index}`).value = parts[5];
    document.getElementById(`pt_zero${index}`).value = parts[6];
    document.getElementById(`pt_max${index}`).value = parts[7];
  }

  // UI → CSV
  function pt_collectConfig(index) {
    const name = document.getElementById(`pt_name${index}`).textContent;
    const pinA = document.getElementById(`pt_pinA${index}`).value || 0;
    const pinB = document.getElementById(`pt_pinB${index}`).value || 0;
    const type = document.getElementById(`pt_type${index}`).value;
    const inv = document.getElementById(`pt_inv${index}`).checked ? 1 : 0;
    const min = document.getElementById(`pt_min${index}`).value || 0;
    const zero = document.getElementById(`pt_zero${index}`).value || 0;
    const max = document.getElementById(`pt_max${index}`).value || 0;

    return [name, pinA, pinB, type, inv, min, zero, max].join(",");
  }

  // Retrieve all configs
  async function pt_retrievePwmThings() {
    for (let i = 0; i < pt_COUNT; i++) {
      try {
        const res = await fetch(`/action?pwmThingRead=${i}`);
        const text = await res.text();
        pt_applyConfig(i, text.trim());
      } catch (e) {
        console.warn("pt_retrieve failed for index", i, e);
      }
    }
  }

  // Store all configs
  async function pt_storePwmThings() {
    for (let i = 0; i < pt_COUNT; i++) {
      const data = pt_collectConfig(i);
      if(data.name === "") continue; // Skip empty configs
      try {
        await fetch(`/action?pwmThingWrite=${i},${data}`);
      } catch (e) {
        console.warn("pt_store failed for index", i, e);
      }
    }
  }

  // Init
  pt_createUI();
  //window.addEventListener("load", pt_retrievePwmThings);

  document.getElementById('btn-reconnect').addEventListener('click', () => {
    fetch('/action?reconnect=1', { method: 'GET', });
  });



  const search_gamepad_button = document.getElementById("searchGamepad");
const search_gamepad_output = document.getElementById("output");

let searching = false;

search_gamepad_button.addEventListener("click", () => {
    if(!searching) {
      lastGamepadButtons = null;
      selectedGamepadIndex = null;
      searching = true;
      search_gamepad_output.textContent = "Press any button on your gamepad...";
      requestAnimationFrame(checkGamepad);
    } else {
      searching = false;
      
      search_gamepad_output.textContent = "No gamepad selecte";
    }
    
});

function checkGamepad() {
    if (!searching) return;

    const gamepads = navigator.getGamepads();

    for (let i = 0; i < gamepads.length; i++) {
        const gp = gamepads[i];
        if (!gp) continue;

        // Check if any button is pressed
        for (let j = 0; j < gp.buttons.length; j++) {
            if (gp.buttons[j].pressed) {
                searching = false;

                search_gamepad_output.textContent = `Gamepad detected: ${gp.id}`;
                console.log("Gamepad ID:", gp.id);

                selectedGamepadIndex = i;

                setCookie(selectedGamepadIndex);

                return;
            }
        }
    }

    // Keep checking
    requestAnimationFrame(checkGamepad);
}

let cookie_gamepad_index = getCookie('gamepad');

if(cookie_gamepad_index>=0) {
  selectedGamepadIndex = cookie_gamepad_index;
  console.log(getCookie('gamepad'));
}
